x-laravel: &laravel
  image: "${LARAVEL_IMAGE}"
  restart: always
  volumes:
    - ./.env:/app/.env
  depends_on:
    - redis
  networks:
    - proxy
  extra_hosts:
    - 'host.docker.internal:host-gateway'

services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_html:/usr/share/nginx/html
      - nginx_certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    labels:
      com.github.nginx-proxy.nginx: "true"
    networks:
      - proxy

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: acme-companion
    restart: always
    volumes:
      - nginx_html:/usr/share/nginx/html
      - nginx_certs:/etc/nginx/certs:rw
      - nginx_acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - nginx-proxy
    networks:
      - proxy

  migrate:
    <<: *laravel
    container_name: laravel-migrate
    # One-shot: apply pending migrations before web/horizon/scheduler start.
    # restart:no so it runs once per deploy; dependents wait for it to exit 0,
    # and a failed migration blocks the new app from starting (stays on old code).
    restart: "no"
    command: php artisan migrate --force --no-interaction

  web:
    <<: *laravel
    container_name: laravel-web
    depends_on:
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      VIRTUAL_HOST: ${APP_HOST}
      VIRTUAL_PORT: 8000
      LETSENCRYPT_HOST: ${APP_HOST}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    command: >
      sh -c "php artisan storage:link --force --no-interaction &&
      php artisan optimize --no-interaction &&
      php artisan octane:frankenphp --no-interaction"

  scheduler:
    <<: *laravel
    container_name: laravel-scheduler
    depends_on:
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "test -f /tmp/healthy && find /tmp/healthy -mmin -1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "php artisan optimize --except=routes,views --no-interaction &&
      php artisan schedule:clear-cache --no-interaction &&
      php artisan schedule:work --verbose --no-interaction"

  horizon:
    <<: *laravel
    container_name: laravel-horizon
    depends_on:
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "php artisan horizon:status | grep running" ]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "php artisan optimize --except=routes,views --no-interaction &&
      php artisan horizon --no-interaction"


  redis:
    image: redis:8.4.2-alpine
    container_name: redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - proxy

volumes:
  nginx_html:
  nginx_certs:
  nginx_acme:
  redis_data:

networks:
  proxy:
    driver: bridge
