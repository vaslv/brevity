# Pin the compose project name so it does not depend on the deploy directory
# (home dir of DEPLOY_USER). Named volumes are prefixed with this; changing it
# orphans the old <project>_* volumes (certs, redis data) — migrate them first.
name: brevity

x-laravel: &laravel
  image: "${LARAVEL_IMAGE}"
  restart: always
  volumes:
    - ./.env:/app/.env
    # Shared, persistent home for the MaxMind geo database. storage/ otherwise
    # lives in the image layer (recreated every deploy), and geo lookups run in
    # laravel-horizon while geo:download-db is run in laravel-web — without a
    # shared named volume the download would never reach the reader, and each
    # deploy would wipe the database and re-hit MaxMind (download limits). The
    # redis lock in GeoDatabaseDownloader already serializes writers across
    # containers, so a single shared volume is safe.
    - geoip_data:/app/storage/app/geoip
  depends_on:
    - redis
  networks:
    - proxy
  extra_hosts:
    - 'host.docker.internal:host-gateway'

services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_html:/usr/share/nginx/html
      - nginx_certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    labels:
      com.github.nginx-proxy.nginx: "true"
    environment:
      # Disable TLS 1.3 (policy allows TLSv1.2 only); default would be Mozilla-Intermediate = TLSv1.2 + TLSv1.3
      SSL_POLICY: AWS-TLS-1-2-2017-01
      # Force HTTP/2 on and HTTP/3 (QUIC) off (these are the image defaults, set explicitly)
      ENABLE_HTTP2: "true"
      ENABLE_HTTP3: "false"
    networks:
      - proxy

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: acme-companion
    restart: always
    volumes:
      - nginx_html:/usr/share/nginx/html
      - nginx_certs:/etc/nginx/certs:rw
      - nginx_acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - nginx-proxy
    networks:
      - proxy

  migrate:
    <<: *laravel
    container_name: laravel-migrate
    # One-shot: apply pending migrations, then seed the short-link domains from
    # APP_HOST, before web/horizon/scheduler start. restart:no so it runs once
    # per deploy; dependents wait for it to exit 0, and a failure here blocks the
    # new app from starting (stays on old code). domains:sync is idempotent.
    restart: "no"
    command: >
      sh -c "php artisan migrate --force --no-interaction &&
      php artisan domains:sync --no-interaction"

  web:
    <<: *laravel
    container_name: laravel-web
    depends_on:
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      VIRTUAL_HOST: ${APP_HOST}
      VIRTUAL_PORT: 8000
      LETSENCRYPT_HOST: ${APP_HOST}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    command: >
      sh -c "php artisan storage:link --force --no-interaction &&
      php artisan optimize --no-interaction &&
      php artisan octane:frankenphp --no-interaction"

  scheduler:
    <<: *laravel
    container_name: laravel-scheduler
    depends_on:
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "test -f /tmp/healthy && find /tmp/healthy -mmin -1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "php artisan optimize --except=routes,views --no-interaction &&
      php artisan schedule:clear-cache --no-interaction &&
      php artisan schedule:work --verbose --no-interaction"

  horizon:
    <<: *laravel
    container_name: laravel-horizon
    # Give Horizon time to shut down gracefully on deploy: on SIGTERM it stops
    # taking jobs and lets in-flight ones finish (up to their own timeout). The
    # geo download runs up to 300s (supervisor-geo grace 330s), so Docker's
    # default 10s stop grace would SIGKILL it mid-run — wedging the download
    # lock. Above supervisor-geo's timeout so the graceful path always wins.
    stop_grace_period: 360s
    depends_on:
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "php artisan horizon:status | grep running" ]
      interval: 30s
      timeout: 10s
      retries: 3
    # exec so `php artisan horizon` becomes PID 1 and receives SIGTERM directly;
    # without it the sh wrapper eats the signal and Horizon never shuts down
    # gracefully (the stop grace above would be moot).
    command: >
      sh -c "php artisan optimize --except=routes,views --no-interaction &&
      exec php artisan horizon --no-interaction"


  redis:
    image: redis:8.4.2-alpine
    container_name: redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - proxy

volumes:
  nginx_html:
  nginx_certs:
  nginx_acme:
  redis_data:
  geoip_data:

networks:
  proxy:
    driver: bridge
