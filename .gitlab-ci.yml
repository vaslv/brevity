stages:
  - build
  - deploy

variables:
  DOCKER_HOST: "unix:///var/run/docker.sock"

build:
  stage: build
  variables:
    DOCKER_BUILDKIT: 1
  script:
    - echo $HARBOR_PASSWORD | docker login -u $HARBOR_USERNAME --password-stdin $HARBOR_HOST
    - docker build --ssh default=$SSH_PRIVATE_KEY_PATH -f Dockerfile -t $HARBOR_HOST/$HARBOR_PROJECT/$CI_PROJECT_NAME:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA} .
    - docker push $HARBOR_HOST/$HARBOR_PROJECT/$CI_PROJECT_NAME:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
  only:
    - tags

deploy:
  stage: deploy
  before_script:
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh
    - cp $SSH_PRIVATE_KEY_PATH ~/.ssh/id_rsa
    - chmod 700 ~/.ssh
    - chmod 600 ~/.ssh/id_rsa
  script:
    - ssh -o StrictHostKeyChecking=no root@$SERVER_IP "ls -lh"
    - scp -o StrictHostKeyChecking=no $DOT_ENV_PATH root@$SERVER_IP:./.env
    - scp -o StrictHostKeyChecking=no docker-compose.production.yml root@$SERVER_IP:./docker-compose.production.yml
    - ssh -o StrictHostKeyChecking=no root@$SERVER_IP "echo $HARBOR_PASSWORD | docker login -u $HARBOR_USERNAME --password-stdin $HARBOR_HOST"
    - ssh -o StrictHostKeyChecking=no root@$SERVER_IP "
      export LARAVEL_IMAGE=\"$HARBOR_HOST/$HARBOR_PROJECT/$CI_PROJECT_NAME:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}\" &&
      docker pull \"\$LARAVEL_IMAGE\" &&
      docker compose --env-file .env -f docker-compose.production.yml up -d --remove-orphans
      "
    - ssh -o StrictHostKeyChecking=no root@$SERVER_IP "
      docker exec laravel-web php artisan storage:link &&
      docker exec laravel-scheduler php artisan optimize:clear &&
      docker exec laravel-scheduler php artisan config:cache &&
      docker exec laravel-scheduler php artisan event:cache &&
      docker exec laravel-scheduler php artisan route:cache &&
      docker exec laravel-scheduler php artisan view:cache &&
      docker exec laravel-scheduler php artisan schedule:clear-cache
      "
  only:
    - tags
