# Reference build-and-deploy pipeline. Optional: the app builds and runs from
# the Dockerfile + docker-compose.production.yml alone; this file automates
# "build image -> push to registry -> deploy over SSH" on any GitLab instance.
# Nothing infrastructure-specific is hardcoded — supply CI/CD variables:
#   HARBOR_HOST / HARBOR_PROJECT / HARBOR_USERNAME / HARBOR_PASSWORD —
#     any container registry (despite the name), e.g. registry.example.com;
#   SERVER_IP, DEPLOY_USER — deploy target reached over SSH;
#   SSH_PRIVATE_KEY_PATH (file), SSH_KNOWN_HOSTS — SSH credentials;
#   DOT_ENV_PATH (file) — production .env copied to the server;
#   HEALTHCHECK_URL — e.g. https://your-host/up, enables the smoke test;
#   ROLLBACK_TAG — set when triggering the manual rollback job.
# Pipelines run on tag pushes only; see docs/06-deploy.md for details.
image: docker:27.5.1

stages:
  - build
  - deploy

variables:
  DOCKER_HOST: "unix:///var/run/docker.sock"
  # SSH login on the deploy server. Defaults to root so existing setups keep
  # working; set DEPLOY_USER to a non-root user with docker access once the
  # server has one (docs/08-decisions.md (audit 2026-06) — Low / CI, block B).
  DEPLOY_USER: "root"

# Reusable shell snippet, referenced from deploy/rollback via *smoke_test.
# Post-deploy health check against the /up route so a broken image fails the
# pipeline. Skipped (with a warning) until HEALTHCHECK_URL is set, mirroring the
# SSH_KNOWN_HOSTS fallback below.
.scripts:
  smoke_test: &smoke_test |
    if [ -z "$HEALTHCHECK_URL" ]; then
      echo "WARNING: HEALTHCHECK_URL is not set; skipping post-deploy smoke test."
    else
      command -v curl >/dev/null 2>&1 || apk add --no-cache curl >/dev/null
      echo "Smoke test: GET $HEALTHCHECK_URL"
      ok=0
      for i in $(seq 1 12); do
        code=$(curl -sS -m 10 -o /dev/null -w '%{http_code}' "$HEALTHCHECK_URL" || true)
        if [ "$code" = "200" ]; then echo "Health OK (HTTP 200) on attempt $i."; ok=1; break; fi
        echo "Attempt $i/12: HTTP ${code:-000}; retrying in 5s..."
        sleep 5
      done
      if [ "$ok" -ne 1 ]; then
        echo "Smoke test FAILED: $HEALTHCHECK_URL never returned HTTP 200."
        exit 1
      fi
    fi

build:
  stage: build
  variables:
    DOCKER_BUILDKIT: 1
  script:
    - echo $HARBOR_PASSWORD | docker login -u $HARBOR_USERNAME --password-stdin $HARBOR_HOST
    - docker build -f Dockerfile -t $HARBOR_HOST/$HARBOR_PROJECT/$CI_PROJECT_NAME:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA} .
    - docker push $HARBOR_HOST/$HARBOR_PROJECT/$CI_PROJECT_NAME:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
  only:
    - tags

# Shared SSH bootstrap for the deploy and rollback jobs.
.deploy_base:
  stage: deploy
  before_script:
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh
    - cp $SSH_PRIVATE_KEY_PATH ~/.ssh/id_rsa
    - chmod 700 ~/.ssh
    - chmod 600 ~/.ssh/id_rsa
    # Pin the host key instead of StrictHostKeyChecking=no. Provide the server's
    # public key out-of-band via the SSH_KNOWN_HOSTS CI variable; if it is unset,
    # fall back to a weaker trust-on-first-use keyscan so the deploy keeps working.
    - |
      if [ -n "$SSH_KNOWN_HOSTS" ]; then
        printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      else
        echo "WARNING: SSH_KNOWN_HOSTS is not set; falling back to ssh-keyscan (trust on first use)."
        ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null
      fi
    - chmod 600 ~/.ssh/known_hosts
  only:
    - tags

deploy:
  extends: .deploy_base
  # Remaining server-side prerequisites to fully activate block B
  # (docs/08-decisions.md (audit 2026-06) — Low / CI):
  #   - create a non-root user with docker access on the server and set the
  #     DEPLOY_USER CI variable to it (defaults to root until then);
  #   - set HEALTHCHECK_URL (e.g. https://<APP_HOST>/up) to enable the smoke test;
  #   - keep old image tags in the registry (Harbor retention policy) so the
  #     manual `rollback` job has a known-good tag to roll back to.
  script:
    - ssh $DEPLOY_USER@$SERVER_IP "ls -lh"
    - scp $DOT_ENV_PATH $DEPLOY_USER@$SERVER_IP:./.env
    - scp docker-compose.production.yml $DEPLOY_USER@$SERVER_IP:./docker-compose.production.yml
    # Pipe the registry password over ssh stdin so it never appears in a command
    # string or process arguments (mirrors the build stage's --password-stdin).
    - echo "$HARBOR_PASSWORD" | ssh $DEPLOY_USER@$SERVER_IP "docker login -u $HARBOR_USERNAME --password-stdin $HARBOR_HOST"
    - ssh $DEPLOY_USER@$SERVER_IP "
      export LARAVEL_IMAGE=\"$HARBOR_HOST/$HARBOR_PROJECT/$CI_PROJECT_NAME:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}\" &&
      docker pull \"\$LARAVEL_IMAGE\" &&
      docker compose --env-file .env -f docker-compose.production.yml up -d --remove-orphans
      "
    - *smoke_test

# Manual rollback: re-deploy a known-good image tag. Trigger from the pipeline
# UI with the ROLLBACK_TAG variable set to a previously built tag (e.g. an older
# git tag), which must still exist in the registry.
rollback:
  extends: .deploy_base
  when: manual
  script:
    - test -n "$ROLLBACK_TAG" || { echo "ROLLBACK_TAG is required (set it to a known-good image tag to roll back to)."; exit 1; }
    - 'echo "Rolling back to image tag: $ROLLBACK_TAG"'
    - scp $DOT_ENV_PATH $DEPLOY_USER@$SERVER_IP:./.env
    - scp docker-compose.production.yml $DEPLOY_USER@$SERVER_IP:./docker-compose.production.yml
    - echo "$HARBOR_PASSWORD" | ssh $DEPLOY_USER@$SERVER_IP "docker login -u $HARBOR_USERNAME --password-stdin $HARBOR_HOST"
    - ssh $DEPLOY_USER@$SERVER_IP "
      export LARAVEL_IMAGE=\"$HARBOR_HOST/$HARBOR_PROJECT/$CI_PROJECT_NAME:$ROLLBACK_TAG\" &&
      docker pull \"\$LARAVEL_IMAGE\" &&
      docker compose --env-file .env -f docker-compose.production.yml up -d --remove-orphans
      "
    - *smoke_test
