# Tests, code style and static analysis for pushes to main and PRs.
# Deliberately NOT triggered on tags: tag pushes drive the deploy pipeline
# (see .gitlab-ci.yml), and the initial tag import must not fan out here.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: brevity
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U brevity"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, intl, pcntl, pdo_pgsql, redis, zip
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Prepare environment
        run: cp .env.example .env

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Generate application key
        run: php artisan key:generate

      - name: Build frontend assets
        run: npm ci && npm run build

      - name: Code style (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress

      - name: Tests
        run: php artisan test --compact
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USERNAME: brevity
          DB_PASSWORD: secret
